<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Dashboard | SecureBank</title>

    <link rel="stylesheet" href="account-details.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">

        <div class="profile-card">

            <div class="profile-icon">
                <i class="fas fa-user-circle"></i>
            </div>

            <h2>Welcome, Santhosh</h2>
            <p>Customer Dashboard</p>

        </div>

        <div class="account-card">

            <div class="card-header">
                <i class="fas fa-wallet"></i>
                <h2>Account Details</h2>
            </div>

            <div class="detail-row">
                <span>Account Number</span>
                <strong>123456789</strong>
            </div>

            <div class="detail-row">
                <span>Account Holder</span>
                <strong>Santhosh</strong>
            </div>

            <div class="detail-row">
                <span>Account Type</span>
                <strong>Savings Account</strong>
            </div>

            <div class="detail-row">
                <span>Branch</span>
                <strong>Chennai Main Branch</strong>
            </div>

            <div class="detail-row balance">
                <span>Available Balance</span>
                <strong>₹25,000</strong>
            </div>

        </div>

        <div class="action-section">

            <a href="deposit.html" class="action-btn">
                <i class="fas fa-arrow-down"></i>
                Deposit
            </a>

            <a href="withdraw.html" class="action-btn">
                <i class="fas fa-arrow-up"></i>
                Withdraw
            </a>

            <a href="transactions.html" class="action-btn">
                <i class="fas fa-file-invoice"></i>
                Transactions
            </a>

        </div>

    </div>

</body>
</html>
