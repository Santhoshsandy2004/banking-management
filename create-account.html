<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Bank Account | SecureBank</title>

    <link rel="stylesheet" href="create-account.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="account-container">

    <div class="account-box">

        <div class="bank-icon">
            <i class="fas fa-building-columns"></i>
        </div>

        <h2>Open New Bank Account</h2>
        <p>Fill in your details to create a SecureBank account.</p>

        <form>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text"
                placeholder="Account Holder Name" required>
            </div>

            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text"
                placeholder="Aadhaar Number" required>
            </div>

            <div class="input-group">
                <i class="fas fa-address-card"></i>
                <input type="text"
                placeholder="PAN Number" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel"
                placeholder="Mobile Number" required>
            </div>

            <div class="input-group">
                <i class="fas fa-money-bill-wave"></i>
                <input type="number"
                placeholder="Initial Deposit Amount" required>
            </div>

            <div class="input-group">
                <i class="fas fa-wallet"></i>

                <select required>
                    <option value="">
                        Select Account Type
                    </option>

                    <option>Savings Account</option>
                    <option>Current Account</option>
                    <option>Fixed Deposit</option>
                </select>
            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

    </div>

</div>

</body>
</html>
